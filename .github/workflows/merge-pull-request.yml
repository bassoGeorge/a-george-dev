name: Clean up PR
on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  Clean_Up:
    runs-on: ubuntu-latest
    steps:
      - name: List comments on the current issue
        uses: actions/github-script@v8
        id: list-urls
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const previewComments = comments.filter(c =>
              c.body.includes('<!-- pr-deploy-urls -->') ||
              c.body.includes('<!-- pr-deploy-urls-outdated -->')
            );

            const previewUrls = [...new Set(
              previewComments.flatMap(c =>
                [...c.body.matchAll(/- \*\*[^*]+\*\*: (https?:\/\/\S+)/g)].map(m => m[1])
              )
            )];

            console.log("Preview URLs found:", previewUrls);
            return previewUrls
      - name: ⬇️ Check out repository code
        uses: actions/checkout@v6
      - name: Setup vercel
        uses: ./.github/actions/setup-vercel-cli
        with:
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_AGEORGEDEV }}
      - name: Remove previews
        shell: bash
        env:
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
        run: echo '${{ steps.list-urls.outputs.result }}' | jq -r ".[]" | xargs vercel remove --scope anish-georges-projects --token $VERCEL_ACCESS_TOKEN --yes
