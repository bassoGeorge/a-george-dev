name: Info
on:
  workflow_call:
    outputs:
      affected_projects:
        description: 'JSON array of affected projects'
        value: ${{ jobs.Info.outputs.affected_projects }}
      should_run_e2e:
        description: 'Whether to run the e2e because of e2e change'
        value: ${{ contains(fromJSON(jobs.Info.outputs.affected_projects), '@ageorgedev/ageorgedev-e2e') }}
      should_deploy_site:
        description: 'Whether to deploy the site'
        value: ${{ contains(fromJSON(jobs.Info.outputs.affected_projects), '@ageorgedev/ageorgedev') }}
      should_deploy_design_system:
        description: 'Whether to deploy the design-system storybook'
        value: ${{ contains(fromJSON(jobs.Info.outputs.affected_projects), '@ageorgedev/design-docs')}}
      production_deploy_matrix:
        description: 'JSON array of projects to deploy to production'
        value: ${{ jobs.Info.outputs.production_deploy_matrix }}
      pr_deploy_matrix:
        description: 'JSON array of projects to deploy for PR previews'
        value: ${{ jobs.Info.outputs.pr_deploy_matrix }}

jobs:
  Info:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Turbo
        uses: ./.github/actions/setup-turbo
      - name: 📦 Install dependencies
        uses: ./.github/actions/install-dependencies
      - name: 🔧 List affected projects
        id: affected_projects
        run: echo "affected_projects=$(yarn affected:apps)" >> "$GITHUB_OUTPUT"
      - name: Compute production deploy matrix
        id: production_deploy_matrix
        env:
          AFFECTED: ${{ steps.affected_projects.outputs.affected_projects }}
          SITE_PROJECT: ${{ vars.VERCEL_PROJECT_AGEORGEDEV }}
          DESIGN_PROJECT: ${{ vars.VERCEL_PROJECT_DESIGN_SYSTEM }}
        run: |
          matrix=$(echo "$AFFECTED" | jq -c '
            . as $p |
            [] |
            if ($p | contains(["@ageorgedev/ageorgedev"])) then
              . + [{"vercel_project_name": env.SITE_PROJECT, "e2e_project": "@ageorgedev/ageorgedev-e2e"}]
            else . end |
            if ($p | contains(["@ageorgedev/design-docs"])) then
              . + [{"vercel_project_name": env.DESIGN_PROJECT}]
            else . end
          ')
          echo "production_deploy_matrix=$matrix" >> "$GITHUB_OUTPUT"
      - name: Compute PR deploy matrix
        id: pr_deploy_matrix
        env:
          AFFECTED: ${{ steps.affected_projects.outputs.affected_projects }}
          SITE_PROJECT: ${{ vars.VERCEL_PROJECT_AGEORGEDEV }}
          DESIGN_PROJECT: ${{ vars.VERCEL_PROJECT_DESIGN_SYSTEM }}
        run: |
          matrix=$(echo "$AFFECTED" | jq -c '
            . as $p |
            [] |
            if (($p | contains(["@ageorgedev/ageorgedev"])) or ($p | contains(["@ageorgedev/ageorgedev-e2e"]))) then
              . + [{"vercel_project_name": env.SITE_PROJECT, "e2e_project": "@ageorgedev/ageorgedev-e2e"}]
            else . end |
            if ($p | contains(["@ageorgedev/design-docs"])) then
              . + [{"vercel_project_name": env.DESIGN_PROJECT}]
            else . end
          ')
          echo "pr_deploy_matrix=$matrix" >> "$GITHUB_OUTPUT"
      - name: 🔍 Debug
        run: |
          echo "affected projects: ${{ steps.affected_projects.outputs.affected_projects }}"
    outputs:
      affected_projects: ${{ steps.affected_projects.outputs.affected_projects }}
      production_deploy_matrix: ${{ steps.production_deploy_matrix.outputs.production_deploy_matrix }}
      pr_deploy_matrix: ${{ steps.pr_deploy_matrix.outputs.pr_deploy_matrix }}
