name: Deploy a.george.dev site
on:
  workflow_call:
    inputs:
      VERCEL_PROJECT_NAME:
        required: true
        type: string
      production:
        required: true
        type: boolean
      e2e_project:
        required: false
        type: string
      pull_request_number:
        required: false
        type: string
        default: ''
    secrets:
      VERCEL_ACCESS_TOKEN:
        required: true
    outputs:
      deploy_url:
        description: 'URL of the deployed site'
        value: ${{ jobs.Deploy.outputs.deploy_url }}

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out repository code
        uses: actions/checkout@v6
      - name: 📦 Install dependencies
        uses: ./.github/actions/install-dependencies
      - name: 🚀 Deploy site
        uses: ./.github/actions/deploy-to-vercel
        id: deploy
        with:
          production: ${{ inputs.production }}
          staged: true
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ inputs.VERCEL_PROJECT_NAME }}
      - name: 🧪 Run e2e
        if: ${{ inputs.e2e_project }}
        uses: ./.github/actions/run-e2e
        with:
          site_url: ${{ steps.deploy.outputs.deploy_url }}
          project: ${{ inputs.e2e_project }}
      - name: Promote to production
        if: ${{ inputs.production }}
        uses: ./.github/actions/promote-vercel-app
        with:
          deploy_url: ${{ steps.deploy.outputs.deploy_url }}
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_PROJECT_NAME: ${{ inputs.VERCEL_PROJECT_NAME }}
      - name: 💬 Post preview URL comment
        if: ${{ inputs.pull_request_number != '' }}
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ inputs.pull_request_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Preview URL: ${{ steps.deploy.outputs.deploy_url }}'
            })
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
